<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>指标统计</title>

<link rel="stylesheet" href="/static/css/style.css">

<script src="/static/js/api.js"></script>

</head>

<body>

<div class="header">检测数据分析系统</div>

<div class="container">

<div class="sidebar">

<a href="/">Dashboard</a>
<a href="/manufacturers">厂家管理</a>
<a href="/products">产品型号</a>
<a href="/batches">检测批次</a>
<a href="/analysis">指标统计</a>

</div>

<div class="content">

<h2>指标统计分析</h2>

<div class="card">

Batch ID
<input id="batchId">

Indicator ID
<input id="indicatorId">

<button onclick="analysis()">统计</button>

</div>

<br>

<div class="card">

<h3>统计结果</h3>

<p>平均值：<span id="mean"></span></p>
<p>最大值：<span id="max"></span></p>
<p>最小值：<span id="min"></span></p>
<p>标准差：<span id="std"></span></p>

</div>

</div>

</div>

<script>

async function analysis(){

let batchId=document.getElementById("batchId").value
let indicatorId=document.getElementById("indicatorId").value

let data=await apiGet(`/analysis?batchId=${batchId}&indicatorId=${indicatorId}`)

let r=data.data

document.getElementById("mean").innerText=r.mean
document.getElementById("max").innerText=r.max
document.getElementById("min").innerText=r.min
document.getElementById("std").innerText=r.std

}

</script>

</body>
</html>
